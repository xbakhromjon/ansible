---
# Versions are intentionally pinned: we manage legacy hosts (Python 3.6) with
# ansible-core 2.16. Newer collection releases (community.general 10+,
# ansible.posix 2+) require ansible-core >=2.17 and target Python 3.7+ (their
# modules use `from __future__ import annotations`) -> they fail on 3.6.
# The versions below are the last ones safely compatible with 2.16 + py3.6.
collections:
  - name: community.general
    version: "9.5.0"
  - name: ansible.posix
    version: "1.6.2"
