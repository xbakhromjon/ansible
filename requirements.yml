# (modullarida `from __future__ import annotations` bor) -> 3.6 da yiqiladi.
# Quyidagilar 2.16 + py3.6 bilan mos oxirgi xavfsiz versiyalar.
collections:
  - name: community.general
    version: "9.5.0"
  - name: ansible.posix
    version: "1.6.2"
