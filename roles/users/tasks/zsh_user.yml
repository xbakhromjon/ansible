---
# Per-user zsh: faqat .zshrc joylanadi (shared Oh My Zsh'ga ishora qiladi).
# Framework va pluginlar `zsh` roli tomonidan UMUMIY o'rnatilgan — bu yerda
# per-user klon YO'Q (egalik/SELinux/disk muammolari bartaraf etilgan).
# loop_var: zuser (users_users dagi dict).
- name: zsh — resolve home for {{ zuser.name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ zuser.name }}"
  tags: [users, users_zsh]

- name: zsh — set home fact for {{ zuser.name }}
  ansible.builtin.set_fact:
    zsh_user_home: "{{ ansible_facts.getent_passwd[zuser.name][4] }}"
  tags: [users, users_zsh]

# OMZ keshini per-user yoziladigan joyga yo'naltiramiz (shared $ZSH read-only).
- name: zsh — ensure per-user OMZ cache dir for {{ zuser.name }}
  ansible.builtin.file:
    path: "{{ zsh_user_home }}/.cache/oh-my-zsh"
    state: directory
    owner: "{{ zuser.name }}"
    group: "{{ zuser.name }}"
    mode: "0755"
  tags: [users, users_zsh]

- name: zsh — deploy .zshrc for {{ zuser.name }} (shared OMZ + theme + plugins)
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ zsh_user_home }}/.zshrc"
    owner: "{{ zuser.name }}"
    group: "{{ zuser.name }}"
    mode: "0644"
  tags: [users, users_zsh]
