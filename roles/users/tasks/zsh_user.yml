---
# Per-user zsh: only the .zshrc is deployed (it points at the shared Oh My Zsh).
# The framework and plugins are installed SHARED by the `zsh` role — there is NO
# per-user clone here (ownership/SELinux/disk problems avoided).
# loop_var: zuser (a dict from users_users).
- name: zsh — resolve home for {{ zuser.name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ zuser.name }}"
  tags: [users, users_zsh]

- name: zsh — set home fact for {{ zuser.name }}
  ansible.builtin.set_fact:
    zsh_user_home: "{{ ansible_facts.getent_passwd[zuser.name][4] }}"
  tags: [users, users_zsh]

# Point the OMZ cache at a per-user writable location (the shared $ZSH is read-only).
- name: zsh — ensure per-user OMZ cache dir for {{ zuser.name }}
  ansible.builtin.file:
    path: "{{ zsh_user_home }}/.cache/oh-my-zsh"
    state: directory
    owner: "{{ zuser.name }}"
    group: "{{ zuser.name }}"
    mode: "0755"
  tags: [users, users_zsh]

- name: zsh — deploy .zshrc for {{ zuser.name }} (shared OMZ + theme + plugins)
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ zsh_user_home }}/.zshrc"
    owner: "{{ zuser.name }}"
    group: "{{ zuser.name }}"
    mode: "0644"
  tags: [users, users_zsh]
