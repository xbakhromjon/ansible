---
# Each user has a `state`:
#   present  (default) — created/enabled, key + sudo applied
#   disabled           — account lock + expire (login blocked), ACCOUNT KEPT
#   absent             — account removed (safe delete), home/data PRESERVED
#
# Note (source of truth): this role only manages the users in the list. Who may
# log in over SSH is decided by the `ssh` role (AllowUsers).

# Snapshot existing users BEFORE creation. This lets us later identify the
# "newly created" users (those given a password) and force them to change it on
# first login (chage -d 0) — idempotently.
- name: Snapshot existing users before creation
  ansible.builtin.getent:
    database: passwd
  tags: [ users ]

- name: Record pre-existing usernames
  ansible.builtin.set_fact:
    users_preexisting: "{{ ansible_facts.getent_passwd.keys() | list }}"
  tags: [ users ]

- name: Ensure primary group (present/disabled)
  ansible.builtin.group:
    name: "{{ item.name }}"
    state: present
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) in ['present', 'disabled']
  tags: [ users ]

- name: Create / ensure users (present/disabled)
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ item.name }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    shell: "{{ item.shell | default(users_default_shell) }}"
    create_home: "{{ item.create_home | default(users_create_home) }}"
    # Password comes from the vault (users_passwords[name], plaintext) -> sha512
    # hash. The salt is derived from the username (stable -> idempotent).
    # update_password: on_create — the password is only set on creation; an
    # existing user's password is left untouched (they can change it themselves).
    password: >-
      {{ (users_passwords[item.name] | password_hash('sha512', (item.name | hash('md5'))[:16]))
         if (item.name in (users_passwords | default({})) and users_passwords[item.name] | length > 0)
         else omit }}
    update_password: on_create
    state: present
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) in ['present', 'disabled']
  tags: [ users ]

# useradd does not re-own an existing home directory (only on creation). If a
# user was deleted and recreated with a different UID, the home (and especially
# .ssh / authorized_keys) is left owned by the stale UID -> sshd StrictModes
# rejects the key and the user cannot write to their home.
#
# SECURITY: we do not blindly recursive-chown on every run — under root,
# chowning a user-controlled directory with follow=true could escape OUTSIDE the
# home via a symlink (privilege escalation). Instead:
#   1) check the home owner with stat,
#   2) fix it ONLY when the owner is wrong (stale UID / recreated),
#   3) follow=false — symlink targets are not traversed, everything stays inside
#      the home.
- name: Stat home directory (detect stale ownership after recreate)
  ansible.builtin.stat:
    path: "/home/{{ item.name }}"
  loop: "{{ users_users }}"
  register: users_home_stat
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default('present')) in ['present', 'disabled']
    - item.create_home | default(users_create_home)
  tags: [ users ]

- name: Fix home ownership only when wrong (safe — no symlink follow)
  ansible.builtin.file:
    path: "/home/{{ item.item.name }}"
    owner: "{{ item.item.name }}"
    group: "{{ item.item.name }}"
    state: directory
    recurse: true
    follow: false
  loop: "{{ users_home_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - not (item.skipped | default(false))
    - item.stat.exists | default(false)
    - (item.stat.pw_name | default('')) != item.item.name
  tags: [ users ]

# CentOS/SELinux: after a home is restored, the .ssh/authorized_keys context may
# be wrong (not ssh_home_t) -> sshd cannot read it. restorecon fixes the label.
- name: Restore SELinux context on home (RedHat/SELinux — fixes authorized_keys label)
  ansible.builtin.command: "restorecon -R -F /home/{{ item.name }}"
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default('present')) in ['present', 'disabled']
    - item.create_home | default(users_create_home)
    - ansible_facts.selinux.status | default('disabled') == 'enabled'
  changed_when: false
  tags: [ users ]

# Only NEWLY created users that received a password: force a password change on
# first login. Users already present (existing) and password-less users are
# skipped -> idempotent (repeated runs do not re-force).
- name: Force password change on first login (newly created users with a password)
  ansible.builtin.command: "chage -d 0 {{ item.name }}"
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - users_force_password_change | default(true)
    - (item.state | default('present')) == 'present'
    - item.name in (users_passwords | default({}))
    - item.name not in users_preexisting
  changed_when: true
  tags: [ users ]

- name: Re-enable active users (remove account expiry)
  ansible.builtin.user:
    name: "{{ item.name }}"
    expires: -1
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'present'
  tags: [ users ]

- name: Disable users (lock password + expire account, keep home)
  ansible.builtin.user:
    name: "{{ item.name }}"
    password_lock: true
    expires: 1
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'disabled'
  tags: [ users ]

- name: Set up authorized SSH keys (present only)
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ lookup('file', users_ssh_keys_dir ~ '/' ~ item.1) }}"
    state: present
  loop: "{{ users_users | subelements('ssh_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  when:
    - (item.0.state | default('present')) == 'present'
    # Skip empty key files (placeholders where no key has been set yet).
    - (lookup('file', users_ssh_keys_dir ~ '/' ~ item.1) | trim | length) > 0
  tags: [ users ]

- name: Grant passwordless sudo (present + sudo)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.sudo | default(false)
    - (item.state | default('present')) == 'present'
  tags: [ users ]

- name: Remove sudoers file (non-sudo / disabled / absent)
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: >-
    not (item.sudo | default(false))
    or (item.state | default('present')) != 'present'
  tags: [ users ]

# SAFE DELETE: the account is removed (login impossible), but the home/data is
# PRESERVED (userdel, not -r). The home is left owned by the old UID/GID — to
# restore it, recreate the user and the "Fix home ownership" task corrects it.
- name: Remove user account, keep home (absent — safe delete)
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: absent
    remove: false
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'absent'
  tags: [ users ]

- name: Remove primary group (absent)
  ansible.builtin.group:
    name: "{{ item.name }}"
    state: absent
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.state | default('present')) == 'absent'
  tags: [ users ]

# Per-user zsh environment — configured AFTER the user is created (in this role),
# so the user exists. Only for present users whose shell is zsh.
- name: Configure zsh dotfiles for present users (Oh My Zsh, plugins, theme)
  ansible.builtin.include_tasks: zsh_user.yml
  loop: "{{ users_users }}"
  loop_control:
    loop_var: zuser
    label: "{{ zuser.name }}"
  when:
    - users_zsh_setup | default(true)
    - (zuser.state | default('present')) == 'present'
    - (zuser.shell | default(users_default_shell)) is search('zsh')
  tags: [ users, users_zsh ]
