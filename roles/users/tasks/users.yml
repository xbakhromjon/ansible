---
- name: Create primary group for each user
  ansible.builtin.group:
    name: "{{ item.name }}"
    state: present
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'present'
  tags: [users]

- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ item.name }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    shell: "{{ item.shell | default(users_default_shell) }}"
    create_home: "{{ item.create_home | default(users_create_home) }}"
    password: "{{ item.password | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [users]

- name: Set up authorized SSH keys
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ users_users | subelements('ssh_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  when: item.0.state | default('present') == 'present'
  tags: [users]

- name: Grant passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.sudo | default(false)
    - item.state | default('present') == 'present'
  tags: [users]

- name: Remove sudoers file for non-sudo / absent users
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ users_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: not (item.sudo | default(false)) or item.state | default('present') == 'absent'
  tags: [users]
