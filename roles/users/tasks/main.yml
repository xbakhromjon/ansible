---
- name: Manage users
  ansible.builtin.include_tasks: users.yml
  tags: [users]

# users_users is the single source of truth (a whitelist). Human users NOT in
# the list are safe-deleted. DANGEROUS — only when users_prune_unmanaged: true.
- name: Prune unmanaged human users (safe-delete)
  ansible.builtin.include_tasks: prune.yml
  when: users_prune_unmanaged | bool
  tags: [users, users_prune]
