---
# DANGEROUS: safe-deletes human users NOT in users_users (the account is removed,
# the home is KEPT). Only invoked when users_prune_unmanaged: true.
#
# Multi-layered protection — the following are NEVER removed:
#   - anything outside the UID range (system accounts: root, daemon, sshd, postgres...)
#   - ansible_user (the account we connect as — lockout protection)
#   - every (managed) user in users_users
#   - anything in the users_prune_keep list
# ALWAYS run with --check first (the preview task shows the list).

- name: Prune — snapshot all users on the host
  ansible.builtin.getent:
    database: passwd
  tags: [users, users_prune]

- name: Prune — index host users by integer uid
  ansible.builtin.set_fact:
    _host_uids: "{{ _host_uids | default({}) | combine({item.key: item.value[1] | int}) }}"
  loop: "{{ ansible_facts.getent_passwd | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags: [users, users_prune]

- name: Prune — compute unmanaged human users
  ansible.builtin.set_fact:
    users_unmanaged: >-
      {{ _host_uids | dict2items
         | selectattr('value', 'ge', users_human_uid_min | int)
         | selectattr('value', 'le', users_human_uid_max | int)
         | map(attribute='key') | list
         | difference(users_users | map(attribute='name') | list)
         | difference([ansible_user])
         | difference(users_prune_keep | default([])) }}
  tags: [users, users_prune]

- name: Prune — preview (these accounts will be safe-deleted; home kept)
  ansible.builtin.debug:
    msg: >-
      Safe-delete (account removed, home kept):
      {{ users_unmanaged | default([]) }}
  tags: [users, users_prune]

- name: Prune — safe-delete unmanaged human users (account removed, home kept)
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: false
  loop: "{{ users_unmanaged | default([]) }}"
  loop_control:
    label: "{{ item }}"
  tags: [users, users_prune]
