---
# List of users to create (dicts). See the comment in group_vars/all/users.yml
# for the structure.
users_users: [ ]

# Default shell for new users. /bin/zsh is installed by the `zsh` role, which
# also registers it in /etc/shells — so in the bootstrap the `zsh` role must run
# BEFORE `users` (so the binary exists). Give a user's `shell:` field to override
# it for a single user.
users_default_shell: /bin/zsh
users_create_home: true

# Initial password for new users (plaintext, sourced from the vault). Map of
# { login_name: plaintext_password }. Populated from vault_user_passwords
# (encrypted) in group_vars/all/users.yml. Empty => no password.
users_passwords: { }

# When true, a newly created user who received an initial password is forced to
# change it on first login (chage -d 0). Only on creation — once.
users_force_password_change: false

# --- Pruning UNMANAGED users (DANGEROUS) ---
# When true, human users NOT listed in users_users are safe-deleted (the account
# is removed, the home is KEPT). That is, users_users becomes the single source
# of truth (a whitelist).
# >>> BEFORE ENABLING: make sure users_users is COMPLETE, and ALWAYS run with
#     --check first (a preview is shown).
# Protection: only users within the (human) UID range; system accounts,
# ansible_user, and users_prune_keep are NEVER removed.
users_prune_unmanaged: false

# "Human user" UID range (login.defs: usually 1000..60000). Accounts outside this
# range (system accounts) are never pruned.
users_human_uid_min: 1000
users_human_uid_max: 60000

# Logins that are ALWAYS protected from pruning (break-glass accounts, etc.).
# ansible_user is protected automatically — no need to list it here.
users_prune_keep: []

# Each entry in a user's ssh_keys list is a file name in this directory (a public
# key). The key text is read from that file. Since playbook_dir is
# .../ansible/playbooks, we point at files/ssh_keys in the project root.
users_ssh_keys_dir: "{{ playbook_dir }}/../files/ssh_keys"

# --- Per-user zsh environment (.zshrc) ---
# AFTER a user is created, deploy their .zshrc (present + zsh shell). The Oh My
# Zsh framework and plugins are installed SHARED by the `zsh` role — this only
# deploys the per-user .zshrc (which points at the shared install). false => skip.
users_zsh_setup: true

# ZSH_THEME in ~/.zshrc.
users_zsh_theme: "dieter"

# plugins=(...) — plugins to enable (must be installed in the shared OMZ).
# Order matters: zsh-syntax-highlighting must be LAST.
users_zsh_plugins:
  - git
  - zsh-autosuggestions
  - zsh-syntax-highlighting

# Location of the shared Oh My Zsh install (set up by the `zsh` role). .zshrc
# points its ZSH at this path.
users_zsh_ohmyzsh_dir: "{{ zsh_ohmyzsh_dir | default('/usr/share/oh-my-zsh') }}"
