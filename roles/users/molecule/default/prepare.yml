---
# Prepare the test containers (runs automatically before converge).
# FOR THE TEST ENVIRONMENT ONLY.
- name: Prepare
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: "Precondition: install zsh"
      ansible.builtin.include_role:
        name: zsh

    # Pre-create a user so we can exercise the 'absent' state — converge should
    # remove it.
    - name: Create a leftover user to later remove (absent test)
      ansible.builtin.user:
        name: dave
        state: present
        create_home: true
