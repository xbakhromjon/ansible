---
- name: Converge
  hosts: all
  become: true
  vars:
    # Key files live inside this scenario (playbook_dir = .../molecule/default).
    users_ssh_keys_dir: "{{ playbook_dir }}/files/ssh_keys"
    users_users:
      - name: alice          # present + sudo + SSH key from file
        sudo: true
        ssh_keys:
          - alice
      - name: carol          # present, no key, no sudo
      - name: bob            # disabled — created, then lock + expire
        state: disabled
      - name: dave           # absent — created by prepare, removed here
        state: absent
  roles:
    - role: users
