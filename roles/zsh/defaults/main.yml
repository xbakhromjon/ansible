---
# Rol qo'llab-quvvatlaydigan OS oilalari (ansible_os_family). Host shu ro'yxatda
# bo'lmasa rol xabar bilan to'liq skip qilinadi (vars/<OS>.yml ham yuklanmaydi).
zsh_supported_os_families: [Debian, RedHat]

# zsh ikkilik fayli yo'li — /etc/shells ga yoziladi, tizim default shell sifatida
# va users roli login shell sifatida ishlatadi. /bin/zsh butun fleet'da yaroqli.
zsh_shell_path: /bin/zsh

# Foydalanuvchi qo'shadigan qo'shimcha zsh paketlari.
zsh_extra_packages: []

# true bo'lsa tizim default shell'i zsh qilinadi (/etc/default/useradd va
# Debian'da /etc/adduser.conf) — useradd/adduser bilan yaratilgan yangi userlar
# avtomatik zsh oladi. false bo'lsa faqat Ansible-managed userlar zsh oladi.
zsh_set_system_default: true

# --- Oh My Zsh (UMUMIY / shared o'rnatish) ---
# Framework bir marta shu joyga klonlanadi (root, read-only) — HAMMA user
# foydalanadi (per-user klon emas). Per-user .zshrc shunga ishora qiladi
# (users roli). false bo'lsa OMZ o'rnatilmaydi.
zsh_install_ohmyzsh: true
zsh_ohmyzsh_dir: /usr/share/oh-my-zsh
zsh_ohmyzsh_repo: https://github.com/ohmyzsh/ohmyzsh.git

# Git'dan klonlanadigan tashqi pluginlar (shared custom/plugins ga).
# Built-in'lar (git) bu yerda emas — ular OMZ bilan keladi.
zsh_external_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
