---
# OS families supported by this role (ansible_os_family). If the host is not in
# this list, the role is skipped entirely with a message (vars/<OS>.yml is not
# loaded either).
zsh_supported_os_families: [ Debian, RedHat ]

# Path to the zsh binary. Written to /etc/shells, used as the system default
# shell, and used as the login shell by the `users` role. /bin/zsh is valid
# across the whole fleet.
zsh_shell_path: /bin/zsh

# Additional zsh-related packages the user may want to install.
zsh_extra_packages: [ ]

# When true, set the system default shell to zsh (/etc/default/useradd, and
# /etc/adduser.conf on Debian) so that new users created with useradd/adduser
# get zsh automatically. When false, only Ansible-managed users get zsh.
zsh_set_system_default: true

# --- Oh My Zsh (SHARED install) ---
# The framework is cloned once into a shared, root-owned, read-only location
# used by EVERY user (not a per-user clone). Per-user .zshrc files point here
# (managed by the `users` role). Set to false to skip installing Oh My Zsh.
zsh_install_ohmyzsh: true
zsh_ohmyzsh_dir: /usr/share/oh-my-zsh
zsh_ohmyzsh_repo: https://github.com/ohmyzsh/ohmyzsh.git

# External plugins cloned from git into the shared custom/plugins directory.
# Built-in plugins (e.g. git) are not listed here — they ship with Oh My Zsh.
zsh_external_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
