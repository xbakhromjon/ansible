---
# Set the system default login shell to zsh so that ANY new user created with
# useradd/adduser (including manual, non-Ansible creation) gets zsh automatically.

- name: Set the default login shell for useradd (/etc/default/useradd)
  ansible.builtin.lineinfile:
    path: /etc/default/useradd
    regexp: '^\s*#?\s*SHELL\s*='
    line: "SHELL={{ zsh_shell_path }}"
    state: present
  tags: [zsh]

# Debian/Ubuntu `adduser` uses its own config file, which RedHat does not have.
- name: Set the default shell for adduser (Debian /etc/adduser.conf)
  ansible.builtin.lineinfile:
    path: /etc/adduser.conf
    regexp: '^\s*#?\s*DSHELL\s*='
    line: "DSHELL={{ zsh_shell_path }}"
    state: present
  when: ansible_os_family == "Debian"
  tags: [zsh]
