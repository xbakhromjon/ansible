---
# zsh roli (TIZIM darajasi): zsh'ni o'rnatadi, /etc/shells, tizim default shell,
# va Oh My Zsh framework'ni UMUMIY (shared) o'rnatadi — bir marta, hamma user
# foydalanadi. Per-user .zshrc (theme, plugin tanlovi) `users` rolida.
# OS-guard: host qo'llab-quvvatlanmaydigan OS oilasida bo'lsa, rolni xabar bilan
# skip qilamiz (vars/<OS>.yml yo'qligi sababli include_vars yiqilishini oldini oladi).
- name: zsh — skip on unsupported OS family
  ansible.builtin.debug:
    msg: >-
      zsh roli '{{ ansible_os_family }}' OS oilasida qo'llab-quvvatlanmaydi
      (ruxsat etilgan: {{ zsh_supported_os_families | join(', ') }}). Skip qilinmoqda.
  when: ansible_os_family not in zsh_supported_os_families
  tags: [zsh]

- name: zsh — role tasks (only on supported OS family)
  when: ansible_os_family in zsh_supported_os_families
  tags: [zsh]
  block:
    - name: Include OS-specific variables
      ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

    - name: Install zsh and register login shell
      ansible.builtin.include_tasks: install.yml

    - name: Set zsh as the system default shell for new users
      ansible.builtin.include_tasks: default_shell.yml
      when: zsh_set_system_default | bool

    - name: Install shared Oh My Zsh framework + plugins
      ansible.builtin.include_tasks: ohmyzsh.yml
      when: zsh_install_ohmyzsh | bool
