---
# zsh role (SYSTEM level): installs zsh, registers it in /etc/shells, sets it as
# the system default shell, and installs the Oh My Zsh framework in a SHARED
# location used by every user. Per-user .zshrc (theme, plugin selection) is
# handled by the `users` role.
#
# OS guard: if the host runs an unsupported OS family, the role is skipped with
# a message. This prevents include_vars from failing on a missing vars/<OS>.yml.
- name: Skip role on unsupported OS family
  ansible.builtin.debug:
    msg: >-
      The zsh role does not support the '{{ ansible_os_family }}' OS family
      (supported: {{ zsh_supported_os_families | join(', ') }}). Skipping.
  when: ansible_os_family not in zsh_supported_os_families
  tags: [zsh]

- name: Run role tasks (supported OS family only)
  when: ansible_os_family in zsh_supported_os_families
  tags: [zsh]
  block:
    - name: Load OS-specific variables
      ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

    - name: Install zsh and register it as a login shell
      ansible.builtin.include_tasks: install.yml

    - name: Set zsh as the system default shell for new users
      ansible.builtin.include_tasks: default_shell.yml
      when: zsh_set_system_default | bool

    - name: Install the shared Oh My Zsh framework and plugins
      ansible.builtin.include_tasks: ohmyzsh.yml
      when: zsh_install_ohmyzsh | bool
