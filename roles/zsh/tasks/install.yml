---
- name: Update apt cache (Debian)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: [zsh]

- name: Install zsh packages (Debian)
  ansible.builtin.apt:
    name: "{{ zsh_packages + zsh_extra_packages }}"
    state: present
  when: ansible_os_family == "Debian"
  tags: [zsh]

- name: Install zsh packages (RedHat)
  ansible.builtin.dnf:
    name: "{{ zsh_packages + zsh_extra_packages }}"
    state: present
  when: ansible_os_family == "RedHat"
  tags: [zsh]

# The `users` role sets this path as the users' login shell. If the binary is
# missing, those users would be locked out at login with a broken shell, so we
# confirm it exists before proceeding.
- name: Check that the zsh binary exists at the expected path
  ansible.builtin.stat:
    path: "{{ zsh_shell_path }}"
  register: zsh_bin
  tags: [zsh]

- name: Assert that the zsh binary is present and executable
  ansible.builtin.assert:
    that:
      - zsh_bin.stat.exists
      - zsh_bin.stat.executable | default(false)
    fail_msg: >-
      zsh was not found at {{ zsh_shell_path }}. Set zsh_shell_path to the
      actual path on this system (e.g. the output of `command -v zsh`).
  tags: [zsh]

- name: Register zsh as a valid login shell (/etc/shells)
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ zsh_shell_path }}"
    state: present
  tags: [zsh]
