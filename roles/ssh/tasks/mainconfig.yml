---
# Old sshd (Ubuntu 18.04, OpenSSH < 8.2, no backport) does not support `Include`
# — the drop-in won't work. So we write directly into the main sshd_config (the
# legacy way). lineinfile REPLACES a single line, so the AllowUsers union problem
# does not apply here.

- name: Set AllowUsers in main sshd_config (no Include support)
  ansible.builtin.lineinfile:
    path: "{{ ssh_sshd_config }}"
    regexp: '^\s*#?\s*AllowUsers\b.*$'
    line: "AllowUsers {{ ssh_allow_users_final | join(' ') }}"
    state: present
    validate: "{{ ssh_validate_cmd }}"
  when: ssh_manage_allow_users | bool
  register: ssh_r_main_allow
  tags: [ssh, ssh_allow_users]

- name: Set hardening directives in main sshd_config (no Include support)
  ansible.builtin.lineinfile:
    path: "{{ ssh_sshd_config }}"
    regexp: '^\s*#?\s*{{ item.key }}\b'
    line: "{{ item.key }} {{ item.value }}"
    state: present
    validate: "{{ ssh_validate_cmd }}"
  loop: "{{ ssh_hardening_directives | dict2items }}"
  loop_control:
    label: "{{ item.key }} {{ item.value }}"
  when: ssh_manage_hardening | bool
  register: ssh_r_main_hardening
  tags: [ssh, ssh_hardening]

# Match blocks go at the END of the file (after the global directives) — blockinfile.
- name: Set Match blocks in main sshd_config (no Include support)
  ansible.builtin.blockinfile:
    path: "{{ ssh_sshd_config }}"
    marker: "# {mark} ANSIBLE MANAGED sshd Match"
    insertafter: EOF
    block: |-
      {% for b in ssh_match_blocks %}
      Match {{ b.match }}
      {% for key, value in b.rules.items() %}
          {{ key }} {{ value }}
      {% endfor %}
      {% endfor %}
    validate: "{{ ssh_validate_cmd }}"
  when: ssh_match_blocks | default([]) | length > 0
  register: ssh_r_main_match
  tags: [ssh, ssh_match]
