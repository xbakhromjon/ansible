---
# ssh roli sshd o'zgarishlarini ikki yo'l bilan qo'llaydi (sshd qobiliyatiga qarab):
#   Include qo'llasa (centos-8, modern)  -> /etc/ssh/sshd_config.d/00-ansible.conf
#   Qo'llamasa (ubuntu-18, OpenSSH 7.6)  -> to'g'ridan-to'g'ri sshd_config
# OS-guard: host qo'llab-quvvatlanmaydigan OS oilasida bo'lsa, rolni xabar bilan
# skip qilamiz (vars/<OS>.yml yo'qligi sababli include_vars yiqilishini oldini oladi).
- name: ssh — skip on unsupported OS family
  ansible.builtin.debug:
    msg: >-
      ssh roli '{{ ansible_os_family }}' OS oilasida qo'llab-quvvatlanmaydi
      (ruxsat etilgan: {{ ssh_supported_os_families | join(', ') }}). Skip qilinmoqda.
  when: ansible_os_family not in ssh_supported_os_families
  tags: [ssh, ssh_allow_users, ssh_hardening]

- name: ssh — role tasks (only on supported OS family)
  when: ansible_os_family in ssh_supported_os_families
  tags: [ssh, ssh_allow_users, ssh_hardening]
  block:
    - name: Include OS-specific variables
      ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

    # AllowUsers ro'yxatini quradi + lockout guard (bo'sh emas, ansible_user bor).
    - name: Build AllowUsers list
      ansible.builtin.import_tasks: allow_users.yml
      when: ssh_manage_allow_users | bool
      tags: [ssh_allow_users]

    # Parol o'chirilayotgan bo'lsa, ansible_user'da kalit borligini tekshiradi.
    - name: Hardening lockout guard
      ansible.builtin.import_tasks: hardening.yml
      when: ssh_manage_hardening | bool
      tags: [ssh_hardening]

    # sshd Include direktivasini qo'llaydimi -> ssh_supports_include.
    - name: Detect sshd Include support
      ansible.builtin.import_tasks: detect.yml

    # Konfiguratsiyani ATOMIK qo'llash + biror bosqich fail bo'lsa AVTOMATIK
    # rollback. apply.yml: known-good backup -> block(yozish + to'liq validate +
    # reload) / rescue(zaxiradan tiklash + reload + fail) / always(tozalash).
    # Drop-in (Yo'l A) yoki mainconfig (Yo'l B) tanlovi apply.yml ichida.
    - name: Apply sshd config (atomic, with rollback)
      ansible.builtin.import_tasks: apply.yml
