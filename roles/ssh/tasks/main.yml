---
# The ssh role applies sshd changes in one of two ways (depending on what sshd
# supports):
#   Include supported (centos-8, modern) -> /etc/ssh/sshd_config.d/00-ansible.conf
#   Not supported (ubuntu-18, OpenSSH 7.6) -> directly into sshd_config
# OS guard: if the host runs an unsupported OS family, the role is skipped with a
# message (this prevents include_vars from failing on a missing vars/<OS>.yml).
- name: ssh — skip on unsupported OS family
  ansible.builtin.debug:
    msg: >-
      The ssh role does not support the '{{ ansible_os_family }}' OS family
      (supported: {{ ssh_supported_os_families | join(', ') }}). Skipping.
  when: ansible_os_family not in ssh_supported_os_families
  tags: [ssh, ssh_allow_users, ssh_hardening]

- name: ssh — role tasks (only on supported OS family)
  when: ansible_os_family in ssh_supported_os_families
  tags: [ssh, ssh_allow_users, ssh_hardening]
  block:
    - name: Include OS-specific variables
      ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

    # Builds the AllowUsers list + lockout guard (never empty, includes ansible_user).
    - name: Build AllowUsers list
      ansible.builtin.import_tasks: allow_users.yml
      when: ssh_manage_allow_users | bool
      tags: [ssh_allow_users]

    # When password auth is being disabled, verify ansible_user has a key.
    - name: Hardening lockout guard
      ansible.builtin.import_tasks: hardening.yml
      when: ssh_manage_hardening | bool
      tags: [ssh_hardening]

    # Does sshd support the Include directive -> ssh_supports_include.
    - name: Detect sshd Include support
      ansible.builtin.import_tasks: detect.yml

    # Apply the configuration ATOMICALLY + AUTOMATIC rollback if any step fails.
    # apply.yml: known-good backup -> block(write + full validate + reload) /
    # rescue(restore from backup + reload + fail) / always(cleanup).
    # The drop-in (path A) vs mainconfig (path B) choice is made inside apply.yml.
    - name: Apply sshd config (atomic, with rollback)
      ansible.builtin.import_tasks: apply.yml
