---
# ALL sshd changes live here — a single drop-in file (template). The main
# sshd_config is touched only once, for the Include line.

- name: Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: "{{ ssh_config_d }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [ssh]

- name: Write Ansible-managed sshd drop-in (AllowUsers + hardening)
  ansible.builtin.template:
    src: 00-ansible.conf.j2
    dest: "{{ ssh_dropin_file }}"
    owner: root
    group: root
    mode: "0644"
    validate: "{{ ssh_validate_cmd }}"
  register: ssh_r_dropin_template
  tags: [ssh]

# For the drop-in to win, the Include must be at the TOP of the file
# ("first value wins"). On modern systems it is already present (the regexp
# matches and it stays in place); on Ubuntu 18.04 it is absent -> prepended.
- name: Ensure sshd_config Includes the drop-in dir (at top of file)
  ansible.builtin.lineinfile:
    path: "{{ ssh_sshd_config }}"
    line: "Include {{ ssh_config_d }}/*.conf"
    regexp: '^\s*Include\s+{{ ssh_config_d | regex_escape }}/\*\.conf\s*$'
    insertbefore: BOF
    firstmatch: true
    state: present
    validate: "{{ ssh_validate_cmd }}"
  register: ssh_r_dropin_include
  tags: [ssh]

# AllowUsers is a LIST directive — multiple lines are ADDED (union), not
# "first wins". So we remove any old AllowUsers from the main file to keep it
# from unioning with the drop-in's (scalar hardening directives don't need this
# — they are first-wins, so the drop-in already takes precedence).
- name: Remove AllowUsers from main sshd_config (additive — would union with drop-in)
  ansible.builtin.lineinfile:
    path: "{{ ssh_sshd_config }}"
    regexp: '^\s*AllowUsers\b'
    state: absent
    validate: "{{ ssh_validate_cmd }}"
  when: ssh_manage_allow_users | bool
  register: ssh_r_dropin_allowclean
  tags: [ssh, ssh_allow_users]
