---
# sshd konfiguratsiyasini ATOMIK qo'llash + biror bosqich fail bo'lsa AVTOMATIK
# rollback. Tartib:
#   1) O'zgarishdan OLDIN known-good config(lar)ni zaxiralaymiz.
#   2) block: yozish (har task o'z validate'i bilan) -> Include bilan BIRLASHGAN
#      to'liq configni reload'dan OLDIN tekshirish (sshd -t) -> o'zgargan bo'lsa
#      reload.
#   3) rescue: biror bosqich (jumladan RELOAD) fail bo'lsa -> zaxiradan tiklash
#      -> qayta reload -> aniq xabar bilan fail.
#      MUHIM: reload BLOK ICHIDA oddiy task — shuning uchun reload fail'ini ham
#      rescue ushlaydi. Handler bo'lganida ushlamasdi (handler blokdan tashqarida).
#   4) always: zaxiralarni tozalash.
#
# Cheklov: rollback faqat Ansible host'ga yeta olsa ishlaydi. Shu sababli RESTART
# emas RELOAD ishlatamiz (mavjud sessiyalar uzilmaydi -> ulanish tirik qoladi).

- name: Backup — ensure backup directory exists
  ansible.builtin.file:
    path: "{{ ssh_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [ssh]

- name: Backup — stat current drop-in (may not exist yet)
  ansible.builtin.stat:
    path: "{{ ssh_dropin_file }}"
  register: ssh_dropin_pre
  tags: [ssh]

- name: Backup — sshd_config (known-good)
  ansible.builtin.copy:
    src: "{{ ssh_sshd_config }}"
    dest: "{{ ssh_backup_dir }}/sshd_config.bak"
    remote_src: true
    owner: root
    group: root
    mode: preserve
  changed_when: false
  tags: [ssh]

- name: Backup — drop-in (known-good, only if present)
  ansible.builtin.copy:
    src: "{{ ssh_dropin_file }}"
    dest: "{{ ssh_backup_dir }}/dropin.conf.bak"
    remote_src: true
    owner: root
    group: root
    mode: preserve
  changed_when: false
  when: ssh_dropin_pre.stat.exists
  tags: [ssh]

- name: Apply sshd config with rollback-on-failure
  tags: [ssh]
  block:
    # Yo'l A: Include qo'llanadi -> drop-in fayl.
    - name: Apply via drop-in (Include supported)
      ansible.builtin.import_tasks: dropin.yml
      when: ssh_supports_include | bool

    # Yo'l B: Include yo'q -> asosiy sshd_config.
    - name: Apply via main sshd_config (no Include support)
      ansible.builtin.import_tasks: mainconfig.yml
      when: not (ssh_supports_include | bool)

    # Drop-in yo'lida har task'dagi validate FAQAT bo'lakni izolyatsiyada
    # tekshiradi. Bu yerda Include bilan BIRLASHGAN to'liq configni reload'dan
    # OLDIN tekshiramiz (combined errors shu yerda ushlanadi -> rescue).
    - name: Validate full sshd config (combined, before reload)
      ansible.builtin.command: "{{ ssh_sshd_bin }} -t"
      changed_when: false

    # Reload faqat config o'zgarganda (idempotent). Yozuvchi task'lar register
    # qilingan; faqat tegishli yo'l ishlaydi, qolgani skip -> changed=false.
    - name: Determine whether a reload is needed
      ansible.builtin.set_fact:
        ssh_reload_needed: >-
          {{ (ssh_r_dropin_template.changed | default(false))
             or (ssh_r_dropin_include.changed | default(false))
             or (ssh_r_dropin_allowclean.changed | default(false))
             or (ssh_r_main_allow.changed | default(false))
             or (ssh_r_main_hardening.changed | default(false))
             or (ssh_r_main_match.changed | default(false)) }}

    - name: Reload sshd (only when config changed)
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: reloaded
      when: ssh_reload_needed | bool

  rescue:
    - name: ROLLBACK — restore sshd_config from backup
      ansible.builtin.copy:
        src: "{{ ssh_backup_dir }}/sshd_config.bak"
        dest: "{{ ssh_sshd_config }}"
        remote_src: true
        owner: root
        group: root
        mode: preserve

    - name: ROLLBACK — restore drop-in (it existed before this run)
      ansible.builtin.copy:
        src: "{{ ssh_backup_dir }}/dropin.conf.bak"
        dest: "{{ ssh_dropin_file }}"
        remote_src: true
        owner: root
        group: root
        mode: preserve
      when: ssh_dropin_pre.stat.exists

    - name: ROLLBACK — remove drop-in we created (did not exist before)
      ansible.builtin.file:
        path: "{{ ssh_dropin_file }}"
        state: absent
      when: not ssh_dropin_pre.stat.exists

    - name: ROLLBACK — reload sshd with the restored config
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: reloaded

    - name: Fail loudly after rollback
      ansible.builtin.fail:
        msg: >-
          sshd o'zgarishi fail bo'ldi va {{ inventory_hostname }} da oldingi
          known-good holatga QAYTARILDI (rollback). Yuqoridagi xato chiqishini
          tekshiring.

  always:
    - name: Cleanup — remove config backups
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ssh_backup_dir }}/sshd_config.bak"
        - "{{ ssh_backup_dir }}/dropin.conf.bak"
      changed_when: false
      tags: [ssh]
