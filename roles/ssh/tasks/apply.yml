---
# Apply the sshd configuration ATOMICALLY + AUTOMATIC rollback if any step fails.
# Order:
#   1) BEFORE changing anything, back up the known-good config(s).
#   2) block: write (each task with its own validate) -> validate the FULL config
#      COMBINED with the Include (sshd -t) BEFORE reload -> reload if changed.
#   3) rescue: if any step (including the RELOAD) fails -> restore from backup
#      -> reload again -> fail with a clear message.
#      IMPORTANT: the reload is a plain task INSIDE the block — so rescue catches
#      a reload failure too. A handler would not be caught (it runs outside the block).
#   4) always: clean up the backups.
#
# Constraint: rollback only works while Ansible can still reach the host. That is
# why we use RELOAD, not RESTART (existing sessions are not dropped -> the
# connection stays alive).

- name: Backup — ensure backup directory exists
  ansible.builtin.file:
    path: "{{ ssh_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [ssh]

- name: Backup — stat current drop-in (may not exist yet)
  ansible.builtin.stat:
    path: "{{ ssh_dropin_file }}"
  register: ssh_dropin_pre
  tags: [ssh]

- name: Backup — sshd_config (known-good)
  ansible.builtin.copy:
    src: "{{ ssh_sshd_config }}"
    dest: "{{ ssh_backup_dir }}/sshd_config.bak"
    remote_src: true
    owner: root
    group: root
    mode: preserve
  changed_when: false
  tags: [ssh]

- name: Backup — drop-in (known-good, only if present)
  ansible.builtin.copy:
    src: "{{ ssh_dropin_file }}"
    dest: "{{ ssh_backup_dir }}/dropin.conf.bak"
    remote_src: true
    owner: root
    group: root
    mode: preserve
  changed_when: false
  when: ssh_dropin_pre.stat.exists
  tags: [ssh]

- name: Apply sshd config with rollback-on-failure
  tags: [ssh]
  block:
    # Path A: Include is supported -> drop-in file.
    - name: Apply via drop-in (Include supported)
      ansible.builtin.import_tasks: dropin.yml
      when: ssh_supports_include | bool

    # Path B: no Include -> main sshd_config.
    - name: Apply via main sshd_config (no Include support)
      ansible.builtin.import_tasks: mainconfig.yml
      when: not (ssh_supports_include | bool)

    # On the drop-in path, each task's validate only checks its fragment in
    # isolation. Here we validate the FULL config COMBINED with the Include
    # BEFORE reload (combined errors are caught here -> rescue).
    - name: Validate full sshd config (combined, before reload)
      ansible.builtin.command: "{{ ssh_sshd_bin }} -t"
      changed_when: false

    # Reload only when the config actually changed (idempotent). The writing
    # tasks are registered; only the relevant path runs, the rest skip -> changed=false.
    - name: Determine whether a reload is needed
      ansible.builtin.set_fact:
        ssh_reload_needed: >-
          {{ (ssh_r_dropin_template.changed | default(false))
             or (ssh_r_dropin_include.changed | default(false))
             or (ssh_r_dropin_allowclean.changed | default(false))
             or (ssh_r_main_allow.changed | default(false))
             or (ssh_r_main_hardening.changed | default(false))
             or (ssh_r_main_match.changed | default(false)) }}

    - name: Reload sshd (only when config changed)
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: reloaded
      when: ssh_reload_needed | bool

  rescue:
    - name: ROLLBACK — restore sshd_config from backup
      ansible.builtin.copy:
        src: "{{ ssh_backup_dir }}/sshd_config.bak"
        dest: "{{ ssh_sshd_config }}"
        remote_src: true
        owner: root
        group: root
        mode: preserve

    - name: ROLLBACK — restore drop-in (it existed before this run)
      ansible.builtin.copy:
        src: "{{ ssh_backup_dir }}/dropin.conf.bak"
        dest: "{{ ssh_dropin_file }}"
        remote_src: true
        owner: root
        group: root
        mode: preserve
      when: ssh_dropin_pre.stat.exists

    - name: ROLLBACK — remove drop-in we created (did not exist before)
      ansible.builtin.file:
        path: "{{ ssh_dropin_file }}"
        state: absent
      when: not ssh_dropin_pre.stat.exists

    - name: ROLLBACK — reload sshd with the restored config
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: reloaded

    - name: Fail loudly after rollback
      ansible.builtin.fail:
        msg: >-
          The sshd change failed and {{ inventory_hostname }} was ROLLED BACK to
          the previous known-good state. Check the error output above.

  always:
    - name: Cleanup — remove config backups
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ssh_backup_dir }}/sshd_config.bak"
        - "{{ ssh_backup_dir }}/dropin.conf.bak"
      changed_when: false
      tags: [ssh]
