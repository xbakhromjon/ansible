---
# AllowUsers = the ACTIVE (present) users from users.yml
#            + ansible_user (lockout protection — ALWAYS)
#            + ssh_allow_users_extra (manual additions)
#            + host-level ssh_extra_allow_users (from inventory)

# This only BUILDS the list; the writing happens in dropin.yml (drop-in template).
- name: Build AllowUsers list from users.yml (active users + ansible_user)
  ansible.builtin.set_fact:
    ssh_allow_users_final: >-
      {{ (
           (users_users | default([]) | rejectattr('state', 'defined')
              | map(attribute='name') | list)
         + (users_users | default([]) | selectattr('state', 'defined')
              | selectattr('state', 'equalto', 'present')
              | map(attribute='name') | list)
         + [ansible_user]
         + (ssh_allow_users_extra | default([]))
         + (ssh_extra_allow_users | default([]))
         ) | unique }}
  tags: [ssh, ssh_allow_users]

- name: Safety — AllowUsers must never be empty (lockout guard)
  ansible.builtin.assert:
    that:
      - ssh_allow_users_final | length > 0
      - ansible_user in ssh_allow_users_final
    fail_msg: >-
      AllowUsers is empty or ansible_user ({{ ansible_user }}) is missing — lockout risk, aborting.
  tags: [ssh, ssh_allow_users]
