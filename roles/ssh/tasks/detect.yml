---
# Does this system's sshd support the `Include` directive?
# Include for sshd_config was added in OpenSSH 8.2+, BUT distros like RHEL8 have
# backported it to 8.0. So instead of checking the VERSION, we RUN A REAL TEST —
# which also correctly detects backports.
#   supported     -> drop-in (dropin.yml)
#   not supported (Ubuntu 18.04 / OpenSSH 7.6) -> main config (mainconfig.yml)

- name: Probe — write a minimal Include test config
  ansible.builtin.copy:
    dest: /tmp/.ansible_sshd_include_probe
    content: "Include /dev/null\n"
    mode: "0600"
  changed_when: false
  tags: [ssh]

- name: Probe — does sshd accept the Include directive?
  ansible.builtin.command: "{{ ssh_sshd_bin }} -t -f /tmp/.ansible_sshd_include_probe"
  register: ssh_include_probe
  changed_when: false
  failed_when: false
  tags: [ssh]

- name: Set Include support fact
  ansible.builtin.set_fact:
    ssh_supports_include: "{{ ssh_include_probe.rc == 0 }}"
  tags: [ssh]

- name: Probe — cleanup
  ansible.builtin.file:
    path: /tmp/.ansible_sshd_include_probe
    state: absent
  changed_when: false
  tags: [ssh]
