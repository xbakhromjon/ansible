---
# sshd hardening LOCKOUT GUARD — the directives themselves are written in
# dropin.yml (template). This file only checks that, if password auth is being
# disabled, ansible_user is not left without a key (otherwise the playbook stops).

- name: Hardening — is password auth being disabled (for the lockout check)?
  ansible.builtin.set_fact:
    ssh_disabling_password: >-
      {{ (ssh_hardening_directives.PasswordAuthentication | default('yes'))
         | string | lower == 'no' }}
  tags: [ssh, ssh_hardening]

# --- LOCKOUT GUARD ---------------------------------------------------------
# If password auth is disabled, ansible_user can only log in with a key. Without
# a key we are all locked out — so we check this beforehand.
- name: Lockout guard — resolve {{ ansible_user }}'s home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"
  when: ssh_disabling_password | bool
  tags: [ssh, ssh_hardening]

- name: Lockout guard — {{ ansible_user }} authorized_keys status
  ansible.builtin.stat:
    path: "{{ getent_passwd[ansible_user][4] }}/.ssh/authorized_keys"
  register: ssh_user_authkeys
  when: ssh_disabling_password | bool
  tags: [ssh, ssh_hardening]

- name: Lockout guard — stop if there is no key
  ansible.builtin.assert:
    that:
      - ssh_user_authkeys.stat.exists
      - ssh_user_authkeys.stat.size | default(0) | int > 0
    fail_msg: >-
      PasswordAuthentication=no is requested, but {{ ansible_user }} has no
      authorized_keys or it is empty — this is a LOCKOUT. Install the SSH key
      first (via the users role), then try again. Or temporarily set
      ssh_hardening_directives.PasswordAuthentication to "yes".
  when: ssh_disabling_password | bool
  tags: [ssh, ssh_hardening]
