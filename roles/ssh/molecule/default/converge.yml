---
- name: Converge
  hosts: all
  become: true
  vars:
    users_users:
      - name: alice          # present + sudo + SSH key from file
        sudo: true
        ssh_keys:
          - alice
      - name: carol          # present, no key, no sudo
      - name: bob            # disabled — created, then lock + expire
        state: disabled
      - name: dave           # absent — created by prepare, removed here
        state: absent
    # Make ansible_user explicit for the docker connection (AllowUsers + lockout guard).
    ansible_user: root
    # Also exercise Match block rendering (drop-in template / mainconfig).
    ssh_match_blocks:
      - match: "User root"
        rules:
          X11Forwarding: "no"
  roles:
    - role: ssh
