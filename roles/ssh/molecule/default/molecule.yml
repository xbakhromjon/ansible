---
# Testing sshd requires systemd running in the container (service reload).
# Hence privileged + cgroup mount + the image's init CMD (command: "").
driver:
  name: docker
platforms:
  - name: ssh-ubuntu-2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: ssh-rocky-10
    image: geerlingguy/docker-rockylinux10-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: ssh-rocky-8
    image: geerlingguy/docker-rockylinux8-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: ssh-ubuntu-1804
    image: geerlingguy/docker-ubuntu1804-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
verifier:
  name: ansible
