---
# OS families supported by this role (ansible_os_family). If the host is not in
# this list, the role is skipped entirely with a message (vars/<OS>.yml is not
# loaded either).
ssh_supported_os_families: [Debian, RedHat]

# Manage AllowUsers (source of truth). When false, no AllowUsers is written to
# the drop-in.
ssh_manage_allow_users: true

# Extra login names granted in AllowUsers on top of the active users from
# users.yml (e.g. service accounts).
ssh_allow_users_extra: []

# --- sshd hardening ---
# When false, no hardening directives are written to the drop-in.
ssh_manage_hardening: true

# sshd_config directives (key: value). Written to the drop-in file.
# >>> LOCKOUT: if PasswordAuthentication is set to "no", ansible_user MUST have
#     authorized_keys — otherwise the playbook stops (guard).
ssh_hardening_directives:
  PasswordAuthentication: "no"
  PermitRootLogin: "no"

# --- Match blocks (optional, conditional settings) ---
# DIFFERENT settings for a specific user/group (SFTP-only, git-shell, etc.).
# Match is rendered AFTER the GLOBAL directives. Note: AllowUsers/AllowGroups do
# NOT work inside Match (they are global). Example:
#   ssh_match_blocks:
#     - match: "User deploy"
#       rules:
#         ForceCommand: "/usr/bin/git-shell"
#         PermitTTY: "no"
#     - match: "Group sftponly"
#       rules:
#         ChrootDirectory: "/sftp/%u"
#         ForceCommand: "internal-sftp"
#         AllowTcpForwarding: "no"
ssh_match_blocks: []

# --- Backup / rollback ---
# BEFORE the config changes, the known-good sshd_config (and drop-in) is backed
# up into this directory; if any step fails, rescue restores the old state.
# NOT under sshd_config.d — kept separate so Include "*.conf" does not scan it.
ssh_backup_dir: /etc/ssh/.ansible-backup

# --- Drop-in location ---
# ALL sshd changes are written to this file; the main sshd_config is touched only
# once, for the Include line. The 00- prefix => first in lexical order => takes
# precedence over cloud-init (50-...) ("first value wins").
ssh_config_d: /etc/ssh/sshd_config.d
ssh_dropin_file: "{{ ssh_config_d }}/00-ansible.conf"
