---
# AllowUsers'ni boshqarish (source of truth). false bo'lsa drop-in'ga
# AllowUsers yozilmaydi.
ssh_manage_allow_users: true

# users.yml dagi faol userlardan tashqari, AllowUsers'ga qo'shimcha ruxsat
# beriladigan login nomlari (masalan servis akkauntlar).
ssh_allow_users_extra: []

# --- sshd hardening ---
# false bo'lsa drop-in'ga hardening direktivalari yozilmaydi.
ssh_manage_hardening: true

# sshd_config direktivalari (kalit: qiymat). Drop-in faylga yoziladi.
# >>> LOCKOUT: PasswordAuthentication "no" qilinsa, ansible_user'da
#     authorized_keys bo'lishi SHART — aks holda playbook to'xtaydi (guard).
ssh_hardening_directives:
  PasswordAuthentication: "no"

# --- Match bloklari (ixtiyoriy, shartli sozlamalar) ---
# Ba'zi user/guruhga BOSHQACHA sozlama (SFTP-only, git-shell va h.k.). Match
# GLOBAL direktivalardan KEYIN render qilinadi. Eslatma: AllowUsers/AllowGroups
# Match ichida ISHLAMAYDI (ular global). Misol:
#   ssh_match_blocks:
#     - match: "User deploy"
#       rules:
#         ForceCommand: "/usr/bin/git-shell"
#         PermitTTY: "no"
#     - match: "Group sftponly"
#       rules:
#         ChrootDirectory: "/sftp/%u"
#         ForceCommand: "internal-sftp"
#         AllowTcpForwarding: "no"
ssh_match_blocks: []

# --- Drop-in joylashuvi ---
# BARCHA sshd o'zgarishlari shu faylga yoziladi; asosiy sshd_config faqat
# Include qatori uchun (bir martalik) tegiladi. 00- prefiks => leksik tartibda
# birinchi => cloud-init (50-...) dan ustun ("birinchi qiymat g'olib").
ssh_config_d: /etc/ssh/sshd_config.d
ssh_dropin_file: "{{ ssh_config_d }}/00-ansible.conf"
