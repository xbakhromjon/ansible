---
# zsh'ni o'rnatadi va foydalanuvchilarning login shell'ini /bin/zsh ga
# o'tkazadi. `users` roli shell tayinlashning yagona egasi (source of truth):
# zsh roli binarni beradi, users roli uni qo'llaydi (users_default_shell).
- name: Install zsh and set it as the default user shell
  hosts: all
  become: true
  roles:
    - role: zsh      # zsh paketi + /etc/shells
    - role: users    # mavjud userlar shell'ini /bin/zsh ga yangilaydi
