---
# Collections for LOCAL TESTING (molecule) only. Production playbooks do not use
# these, which is why they are kept separate from requirements.yml.
#
# community.docker is used by molecule's docker driver to create/destroy
# containers. Since tests run on fresh images (ubuntu-2404, rocky-10), the
# legacy-OS (py3.6) constraint does not apply here. 3.x is compatible with
# ansible-core 2.16.
collections:
  - name: community.docker
    version: ">=3.4.0,<4.0.0"
